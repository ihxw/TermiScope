name: Auto Release on Version Change

# 仅由 Gitea repository_dispatch 或手动触发，避免 push main 与 dispatch 重复执行
on:
  repository_dispatch:
    types:
      - sync-from-gitea
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver without v prefix (e.g. 1.5.38)'
        required: true

concurrency:
  group: termiscope-release
  cancel-in-progress: true

run-name: Release v${{ github.event.client_payload.version || inputs.version }}

jobs:
  check-version:
    runs-on: self-hosted
    permissions:
      contents: read
    env:
      HOME: /root
      XDG_CACHE_HOME: /root/.cache
      GOCACHE: /root/.cache/go-build
    outputs:
      version_changed: ${{ steps.check.outputs.changed }}
      new_version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare self-hosted runner env
        shell: bash
        run: bash ./scripts/ci/prepare_runner_env.sh

      - name: Detect existing toolchain
        id: toolchain
        shell: bash
        run: bash ./scripts/ci/detect_release_toolchain.sh

      - name: Setup Node.js (version check)
        if: steps.toolchain.outputs.setup_node == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check if version is newer than latest release
        id: check
        shell: bash
        env:
          # 自建 Runner 上 GITHUB_TOKEN 有时不会自动注入 shell，需显式传入
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DISPATCH_VERSION: ${{ github.event.client_payload.version }}
          MANUAL_VERSION: ${{ inputs.version }}
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            if [ -z "$DISPATCH_VERSION" ]; then
              echo "repository_dispatch 缺少 client_payload.version" >&2
              exit 1
            fi
            VERSION=$(bash ./scripts/ci/normalize_release_version.sh "$DISPATCH_VERSION")
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "Gitea sync dispatch: release v${VERSION}"
            exit 0
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION=$(bash ./scripts/ci/normalize_release_version.sh "$MANUAL_VERSION")
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch: release v${VERSION}"
            exit 0
          fi
          bash ./scripts/ci/check_version_gt_release.sh

  trigger-release:
    needs: check-version
    if: needs.check-version.outputs.version_changed == 'true'
    runs-on: self-hosted
    permissions:
      contents: write
    env:
      HOME: /root
      XDG_CACHE_HOME: /root/.cache
      GOCACHE: /root/.cache/go-build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare self-hosted runner env
        shell: bash
        run: bash ./scripts/ci/prepare_runner_env.sh

      - name: Detect existing toolchain
        id: toolchain
        shell: bash
        run: bash ./scripts/ci/detect_release_toolchain.sh

      - name: Setup Go
        if: steps.toolchain.outputs.setup_go == 'true'
        shell: bash
        run: bash ./scripts/ci/setup_go.sh

      - name: Setup Node.js
        if: steps.toolchain.outputs.setup_node == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install OS build tools (Linux)
        if: runner.os == 'Linux' && steps.toolchain.outputs.install_os_deps == 'true'
        shell: bash
        run: bash ./scripts/ci/install_release_deps.sh

      - name: Verify build environment
        shell: bash
        run: bash ./scripts/ci/verify_release_env.sh

      - name: Build Release
        shell: bash
        run: bash ./build_release.sh

      - name: Fix Scripts Line Endings
        shell: bash
        run: |
          for script in scripts/install.sh scripts/uninstall.sh; do
            if [ -f "$script" ]; then
              sed -i 's/\r$//' "$script"
            fi
          done
      
      - name: Create Tag and Prepare Release Notes
        id: prepare_release
        shell: bash
        run: bash ./scripts/ci/prepare_auto_release.sh "${{ needs.check-version.outputs.new_version }}"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prepare_release.outputs.version }}
          name: Release ${{ steps.prepare_release.outputs.version }}
          body_path: release_notes.md
          files: |
            release/*
            scripts/install.sh
            scripts/install.ps1
          draft: false
          prerelease: false
