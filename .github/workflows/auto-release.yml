name: Auto Release on Version Change

on:
  push:
    branches:
      - main
    paths:
      - 'web/package.json'

jobs:
  check-version:
    runs-on: self-hosted
    outputs:
      version_changed: ${{ steps.check.outputs.changed }}
      new_version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js (version check)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check if version changed
        id: check
        shell: bash
        run: |
          read_version() { node -e "console.log(require('./web/package.json').version)"; }
          CURRENT_VERSION=$(read_version)
          
          git checkout HEAD~1 -- web/package.json 2>/dev/null || true
          PREV_VERSION=$(read_version 2>/dev/null || echo "0.0.0")
          
          git checkout HEAD -- web/package.json
          
          echo "Current version: $CURRENT_VERSION"
          echo "Previous version: $PREV_VERSION"
          
          if [ "$CURRENT_VERSION" != "$PREV_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            echo "Version changed from $PREV_VERSION to $CURRENT_VERSION"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Version unchanged"
          fi

  trigger-release:
    needs: check-version
    if: needs.check-version.outputs.version_changed == 'true'
    runs-on: self-hosted
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install OS build tools (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: bash ./scripts/ci/install_release_deps.sh

      - name: Verify build environment
        shell: bash
        run: bash ./scripts/ci/verify_release_env.sh

      - name: Build Release
        shell: bash
        run: bash ./build_release.sh

      - name: Fix Scripts Line Endings
        shell: bash
        run: |
          for script in scripts/install.sh scripts/uninstall.sh; do
            if [ -f "$script" ]; then
              sed -i 's/\r$//' "$script"
            fi
          done
      
      - name: Create Tag and Prepare Release Notes
        id: prepare_release
        shell: bash
        run: bash ./scripts/ci/prepare_auto_release.sh "${{ needs.check-version.outputs.new_version }}"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prepare_release.outputs.version }}
          name: Release ${{ steps.prepare_release.outputs.version }}
          body_path: release_notes.md
          files: |
            release/*
            scripts/install.sh
          draft: false
          prerelease: false
