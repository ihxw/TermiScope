name: Auto Release on Version Change

on:
  push:
    branches:
      - main
    paths:
      - 'web/package.json'

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check.outputs.changed }}
      new_version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      
      - name: Check if version changed
        id: check
        run: |
          # Get current version
          CURRENT_VERSION=$(jq -r '.version' web/package.json)
          
          # Get previous version (from previous commit)
          git checkout HEAD~1 -- web/package.json 2>/dev/null || true
          PREV_VERSION=$(jq -r '.version' web/package.json 2>/dev/null || echo "0.0.0")
          
          # Restore current version
          git checkout HEAD -- web/package.json
          
          echo "Current version: $CURRENT_VERSION"
          echo "Previous version: $PREV_VERSION"
          
          if [ "$CURRENT_VERSION" != "$PREV_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            echo "Version changed from $PREV_VERSION to $CURRENT_VERSION"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Version unchanged"
          fi

  trigger-release:
    needs: check-version
    if: needs.check-version.outputs.version_changed == 'true'
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build Release
        shell: powershell
        run: .\build_release.ps1

      - name: Fix Scripts Line Endings
        shell: powershell
        run: |
          $scripts = @("scripts/install.sh", "scripts/uninstall.sh")
          foreach ($script in $scripts) {
            $content = [IO.File]::ReadAllText($script)
            $content = $content -replace "`r`n", "`n"
            [IO.File]::WriteAllText($script, $content, [System.Text.UTF8Encoding]::new($false))
          }
      
      - name: Create Tag and Prepare Release Notes
        id: prepare_release
        shell: pwsh
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $OutputEncoding = [System.Text.Encoding]::UTF8

          $VERSION = "v${{ needs.check-version.outputs.new_version }}"
          Write-Host "Creating release: $VERSION"
          
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Create and push tag
          git tag -a $VERSION -m "Release $VERSION"
          git push origin $VERSION
          
          # Build release notes without heredoc (heredoc content must be column-0, conflicts with YAML indentation)
          $nl = [System.Environment]::NewLine
          $notes = "## TermiScope $VERSION" + $nl + $nl
          $notes += "自动发布版本 $VERSION" + $nl + $nl
          $notes += "### 更新内容" + $nl
          $notes += "请查看提交历史了解详细变更。"
          
          # Persist release notes as UTF-8 without BOM so GitHub reads Chinese text correctly.
          [System.IO.File]::WriteAllText("release_notes.md", $notes, [System.Text.UTF8Encoding]::new($false))

          "version=$VERSION" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prepare_release.outputs.version }}
          name: Release ${{ steps.prepare_release.outputs.version }}
          body_path: release_notes.md
          files: |
            release/*
            scripts/install.sh
          draft: false
          prerelease: false
