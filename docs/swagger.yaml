basePath: /api
definitions:
  gorm.DeletedAt:
    properties:
      time:
        type: string
      valid:
        description: Valid is true if Time is not NULL
        type: boolean
    type: object
  handlers.CreateSSHHostRequest:
    properties:
      auth_type:
        enum:
        - password
        - key
        type: string
      billing_amount:
        type: number
      billing_period:
        type: string
      currency:
        type: string
      description:
        type: string
      expiration_date:
        description: Financial Management
        type: string
      group_name:
        type: string
      host:
        type: string
      host_type:
        enum:
        - control_monitor
        - monitor_only
        type: string
      name:
        type: string
      password:
        type: string
      port:
        type: integer
      private_key:
        type: string
      tags:
        type: string
      username:
        type: string
    required:
    - host_type
    - name
    type: object
  handlers.LoginRequest:
    properties:
      password:
        type: string
      remember:
        type: boolean
      username:
        type: string
    required:
    - password
    - username
    type: object
  handlers.LoginResponse:
    properties:
      refresh_token:
        type: string
      token:
        type: string
      user:
        $ref: '#/definitions/models.User'
    type: object
  handlers.RefreshTokenRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  handlers.ReorderRequest:
    properties:
      device_ids:
        items:
          type: integer
        type: array
    required:
    - device_ids
    type: object
  handlers.UpdateSSHHostRequest:
    properties:
      auth_type:
        enum:
        - password
        - key
        type: string
      billing_amount:
        type: number
      billing_period:
        type: string
      currency:
        type: string
      description:
        type: string
      expiration_date:
        description: Financial Management
        type: string
      group_name:
        type: string
      host:
        type: string
      host_type:
        enum:
        - control_monitor
        - monitor_only
        type: string
      name:
        type: string
      net_interface:
        description: Network Config
        type: string
      net_reset_day:
        type: integer
      net_traffic_counter_mode:
        description: total, rx, tx
        type: string
      net_traffic_limit:
        description: Traffic Limit Config
        type: integer
      net_traffic_used_adjustment:
        type: integer
      notify_channels:
        type: string
      notify_offline_enabled:
        description: Notification
        type: boolean
      notify_offline_threshold:
        type: integer
      notify_traffic_enabled:
        type: boolean
      notify_traffic_threshold:
        type: integer
      password:
        type: string
      port:
        type: integer
      private_key:
        type: string
      reset_traffic:
        description: Actions
        type: boolean
      tags:
        type: string
      username:
        type: string
    type: object
  models.SSHHost:
    properties:
      agent_version:
        description: Monitor Status
        type: string
      auth_type:
        description: password or key
        type: string
      billing_amount:
        description: Cost per billing period
        type: number
      billing_period:
        description: monthly, quarterly, semiannually, annually
        type: string
      created_at:
        type: string
      currency:
        description: CNY, USD, GBP, EUR, JPY
        type: string
      deleted_at:
        $ref: '#/definitions/gorm.DeletedAt'
      description:
        type: string
      expiration_date:
        description: Financial Management
        type: string
      fingerprint:
        description: SSH Host Key Fingerprint (TOFU)
        type: string
      group_name:
        type: string
      host:
        type: string
      host_type:
        description: control_monitor or monitor_only
        type: string
      id:
        type: integer
      last_agent_timestamp:
        description: Timestamp of last processed packet
        type: integer
      last_pulse:
        type: string
      last_scan_at:
        type: string
      monitor_enabled:
        type: boolean
      monitor_secret:
        type: string
      name:
        type: string
      net_interface:
        description: Network Config
        type: string
      net_last_raw_rx:
        description: Last known raw total from agent
        type: integer
      net_last_raw_tx:
        type: integer
      net_last_reset_date:
        description: YYYY-MM-DD
        type: string
      net_monthly_rx:
        description: Traffic Accumulators (Delta Logic)
        type: integer
      net_monthly_tx:
        type: integer
      net_reset_day:
        description: Day of month to reset
        type: integer
      net_traffic_counter_mode:
        description: total, rx, tx
        type: string
      net_traffic_limit:
        description: Traffic Limit Config
        type: integer
      net_traffic_used_adjustment:
        description: Bytes, manual correction
        type: integer
      notify_channels:
        description: comma-separated
        type: string
      notify_offline_enabled:
        description: Notification Config
        type: boolean
      notify_offline_threshold:
        description: Minutes
        type: integer
      notify_traffic_enabled:
        type: boolean
      notify_traffic_threshold:
        description: Percent
        type: integer
      password:
        description: Transient fields (not stored in database)
        type: string
      port:
        type: integer
      private_key:
        type: string
      sort_order:
        type: integer
      status:
        description: online, offline
        type: string
      tags:
        type: string
      traffic_alerted:
        type: boolean
      updated_at:
        type: string
      user_id:
        type: integer
      username:
        type: string
    type: object
  models.User:
    properties:
      created_at:
        type: string
      display_name:
        type: string
      email:
        type: string
      id:
        type: integer
      last_login_at:
        type: string
      role:
        description: admin or user
        type: string
      status:
        description: active or disabled
        type: string
      two_factor_enabled:
        type: boolean
      updated_at:
        type: string
      username:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: This is the API documentation for TermiScope Server.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: TermiScope API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user and returns access/refresh tokens.
      parameters:
      - description: Login Credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.LoginResponse'
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Invalid credentials
          schema:
            additionalProperties:
              type: string
            type: object
      summary: User Login
      tags:
      - Auth
  /auth/logout:
    post:
      description: Logs out the user (client-side action for JWT).
      responses:
        "200":
          description: Success message
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Logout
      tags:
      - Auth
  /auth/me:
    get:
      description: Returns the profile of the currently logged-in user.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.User'
        "404":
          description: User not found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get Current User
      tags:
      - Auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Refreshes the access token using a valid refresh token.
      parameters:
      - description: Refresh Token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: New Access Token
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Invalid token
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Refresh Token
      tags:
      - Auth
  /ssh-hosts:
    get:
      description: Get all SSH hosts for the authenticated user
      parameters:
      - description: Group Name
        in: query
        name: group
        type: string
      - description: Search Term (Name, Host, Description)
        in: query
        name: search
        type: string
      - description: Include deleted hosts
        in: query
        name: include_deleted
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.SSHHost'
            type: array
      security:
      - BearerAuth: []
      summary: List SSH Hosts
      tags:
      - Host
    post:
      consumes:
      - application/json
      description: Add a new SSH host
      parameters:
      - description: Host Details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateSSHHostRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.SSHHost'
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create SSH Host
      tags:
      - Host
  /ssh-hosts/{id}:
    delete:
      description: Soft delete a host
      parameters:
      - description: Host ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: Success message
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Host not found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete SSH Host
      tags:
      - Host
    get:
      description: Get details of a specific host
      parameters:
      - description: Host ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.SSHHost'
        "404":
          description: Host not found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get SSH Host
      tags:
      - Host
    put:
      consumes:
      - application/json
      description: Update details of an existing host
      parameters:
      - description: Host ID
        in: path
        name: id
        required: true
        type: integer
      - description: Update Details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.UpdateSSHHostRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.SSHHost'
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Host not found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update SSH Host
      tags:
      - Host
  /ssh-hosts/{id}/permanent:
    delete:
      description: Hard delete a host and its relations
      parameters:
      - description: Host ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: Success message
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Permanently Delete SSH Host
      tags:
      - Host
  /ssh-hosts/{id}/test:
    post:
      description: Ping or Connect to the host to check status
      parameters:
      - description: Host ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: Status and Latency
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Test Connectivity
      tags:
      - Host
  /ssh-hosts/reorder:
    put:
      description: Batch update sort order for hosts
      parameters:
      - description: Device IDs in order
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.ReorderRequest'
      responses:
        "200":
          description: Success message
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Reorder Hosts
      tags:
      - Host
  /system/info:
    get:
      description: Returns system version information.
      produces:
      - application/json
      responses:
        "200":
          description: System Info
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get System Info
      tags:
      - System
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
