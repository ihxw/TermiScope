<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>{{ 'nav.recordings' | translate }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list>
    <ion-item-sliding *ngFor="let recording of recordings">
      <ion-item>
        <ion-icon slot="start" name="videocam" color="danger"></ion-icon>
        <ion-label>
          <h2>{{ recording.host_name }}</h2>
          <p>{{ recording.username }}</p>
          <p>
            <small>
              {{ formatDate(recording.started_at) }} | 
              {{ formatDuration(recording.duration || 0) }} | 
              {{ formatSize(recording.file_size || 0) }}
            </small>
          </p>
        </ion-label>
      </ion-item>

      <ion-item-options side="end">
        <ion-item-option color="primary" (click)="playRecording(recording)">
          <ion-icon name="play" slot="icon-only"></ion-icon>
        </ion-item-option>
        <ion-item-option color="danger" (click)="deleteRecording(recording)">
          <ion-icon name="trash" slot="icon-only"></ion-icon>
        </ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
  </ion-list>

  <!-- Empty State -->
  <div class="ion-text-center ion-padding" *ngIf="recordings.length === 0 && !loading">
    <ion-icon name="videocam" style="font-size: 64px; color: var(--ion-color-medium);"></ion-icon>
    <h3>{{ 'nav.recordings' | translate }}</h3>
    <p>{{ 'recording.title' | translate }}</p>
  </div>

  <!-- Refresh -->
  <ion-refresher slot="fixed" (ionRefresh)="loadRecordings(); $event.target.complete()">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>
</ion-content>
