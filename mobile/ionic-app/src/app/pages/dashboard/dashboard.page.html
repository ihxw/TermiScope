<ion-split-pane contentId="main-content">
  <!-- Side Menu -->
  <ion-menu contentId="main-content" type="overlay">
    <ion-header>
      <ion-toolbar>
        <ion-title>TermiScope</ion-title>
      </ion-toolbar>
    </ion-header>
    
    <ion-content>
      <ion-list>
        <ion-menu-toggle auto-hide="false" *ngFor="let page of filteredPages">
          <ion-item [routerLink]="page.url" routerDirection="root" routerLinkActive="selected">
            <ion-icon slot="start" [name]="page.icon"></ion-icon>
            <ion-label>{{ page.title | translate }}</ion-label>
          </ion-item>
        </ion-menu-toggle>
      </ion-list>
    </ion-content>
    
    <ion-footer>
      <ion-toolbar>
        <ion-item lines="none">
          <ion-label>
            <p>{{ authStore.user?.username }}</p>
            <p class="version-text">v{{ frontendVersion }}</p>
          </ion-label>
        </ion-item>
        <ion-buttons slot="end">
          <ion-button (click)="localeStore.toggleLocale()">
            {{ localeStore.nextLanguage }}
          </ion-button>
          <ion-button (click)="themeStore.toggleTheme()">
            <ion-icon [name]="themeStore.isDark ? 'sunny' : 'moon'"></ion-icon>
          </ion-button>
          <ion-button (click)="goToProfile()">
            <ion-icon name="person"></ion-icon>
          </ion-button>
          <ion-button (click)="logout()">
            <ion-icon name="log-out"></ion-icon>
          </ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-footer>
  </ion-menu>

  <!-- Main Content -->
  <ion-router-outlet id="main-content"></ion-router-outlet>
</ion-split-pane>
