<ion-content class="ion-padding">
  <div class="reset-password-container">
    <!-- Logo -->
    <div class="ion-text-center" style="margin-bottom: 24px;">
      <ion-icon name="terminal" style="font-size: 48px; color: var(--ion-color-primary);"></ion-icon>
      <h2>TermiScope</h2>
      <h3>{{ 'auth.resetPassword' | translate }}</h3>
    </div>

    <!-- Error Alert -->
    <ion-item color="danger" lines="none" *ngIf="error" style="margin-bottom: 16px; border-radius: 8px;">
      <ion-icon name="alert-circle" slot="start"></ion-icon>
      <ion-label class="ion-text-wrap">{{ error }}</ion-label>
      <ion-button slot="end" fill="clear" color="light" (click)="error = ''">
        <ion-icon name="close" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-item>

    <!-- Form -->
    <ion-list>
      <ion-item>
        <ion-label position="stacked">{{ 'auth.newPassword' | translate }}</ion-label>
        <ion-input [(ngModel)]="password" type="password" 
          [placeholder]="'auth.newPasswordPlaceholder' | translate"></ion-input>
      </ion-item>
      <ion-item>
        <ion-label position="stacked">{{ 'auth.confirmPassword' | translate }}</ion-label>
        <ion-input [(ngModel)]="confirmPassword" type="password"
          [placeholder]="'auth.confirmPasswordPlaceholder' | translate"></ion-input>
      </ion-item>
    </ion-list>

    <div style="margin-top: 24px; display: flex; gap: 12px;">
      <ion-button expand="block" [disabled]="loading" (click)="resetPassword()" style="flex: 1;">
        {{ 'auth.resetPassword' | translate }}
      </ion-button>
      <ion-button expand="block" fill="outline" (click)="goToLogin()" style="flex: 1;">
        {{ 'common.cancel' | translate }}
      </ion-button>
    </div>
  </div>
</ion-content>
