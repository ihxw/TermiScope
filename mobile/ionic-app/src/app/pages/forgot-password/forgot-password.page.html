<ion-content class="forgot-content">
  <div class="forgot-container">
    <div class="forgot-box">
      <div class="forgot-title">
        <ion-icon name="code-slash" style="font-size: 32px; margin-bottom: 8px"></ion-icon>
        <div>TermiScope</div>
      </div>

      <div *ngIf="!emailSent">
        <ion-item lines="none">
          <ion-label>
            <h2>{{ 'auth.resetPassword' | translate }}</h2>
            <p>{{ 'auth.resetPasswordDesc' | translate }}</p>
          </ion-label>
        </ion-item>

        <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
          <ion-item>
            <ion-label position="stacked">{{ 'auth.email' | translate }}</ion-label>
            <ion-input 
              formControlName="email" 
              type="email"
              [placeholder]="'auth.emailRequired' | translate">
            </ion-input>
          </ion-item>

          <ion-button 
            expand="block" 
            type="submit" 
            [disabled]="forgotForm.invalid"
            class="submit-btn">
            {{ 'auth.sendResetEmail' | translate }}
          </ion-button>
        </form>
      </div>

      <div *ngIf="emailSent" class="success-message">
        <ion-icon name="checkmark-circle" color="success" style="font-size: 64px;"></ion-icon>
        <h2>{{ 'auth.resetEmailSent' | translate }}</h2>
        <ion-button expand="block" fill="outline" (click)="backToLogin()">
          {{ 'common.backToLogin' | translate }}
        </ion-button>
      </div>

      <ion-button expand="block" fill="clear" (click)="backToLogin()" *ngIf="!emailSent">
        {{ 'common.backToLogin' | translate }}
      </ion-button>
    </div>
  </div>
</ion-content>
