worker_processes 1;
pid /root/code/gitea/TermiScope/deploy/local-https/tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  access_log /root/code/gitea/TermiScope/deploy/local-https/logs/access.log;
  error_log /root/code/gitea/TermiScope/deploy/local-https/logs/error.log info;

  client_max_body_size 1024m;
  proxy_read_timeout 3600s;
  proxy_send_timeout 3600s;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  server {
    listen 3443 ssl;
    server_name ccs.iwlz.de localhost 127.0.0.1 23.94.121.186 172.30.10.1;

    ssl_certificate /root/code/gitea/TermiScope/deploy/local-https/certs/termiscope-local.crt;
    ssl_certificate_key /root/code/gitea/TermiScope/deploy/local-https/certs/termiscope-local.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
      proxy_pass http://127.0.0.1:3000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }
  }
}
